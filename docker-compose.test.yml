services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: registry_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d registry_test"]
      interval: 2s
      timeout: 3s
      retries: 15
