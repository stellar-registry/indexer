name: registry-turbo-v4
resource_size: xl
use_dedicated_ip: false
job: false
sources:
  goldsky_source:
    dataset_name: stellar_testnet.events
    start_at: 2038000
    type: dataset
    version: 1.2.0
transforms:
  transform_1_events:
    primary_key: id
    sql: |-
      SELECT *
      FROM goldsky_source
      WHERE in_successful_contract_call = true
        AND transaction_successful = true
        AND id NOT LIKE '%-op-none-%'
        AND JSON_VALUE(topics, '$[0].symbol') IN (
              'deploy',
              'publish',
              'register',
              'rename',
              'update_address',
              'update_owner',
              'sub_reg'
            )
    type: sql
  transform_2_events_with_command_name:
    primary_key: id
    sql: |-
      select
        id,
        transaction_hash,
        ledger_sequence,
        ledger_closed_at as created_at,
        JSON_VALUE(topics, '$[0].symbol') as command,
        contract_id as channel,
        contract_id as emitter_contract_id,
        data,
        topics
      from transform_1_events
    type: sql
  transform_3_deploy_events:
    primary_key: id
    sql: |-
      SELECT 
        id,
        transaction_hash, 
        ledger_sequence, 
        created_at, 
        channel,

        -- WASM Name (Looking for 'wasm_name' key, extracting 'string' value)
        CASE
            WHEN JSON_VALUE(data, '$.map[0].key.symbol') = 'wasm_name' 
                THEN JSON_VALUE(data, '$.map[0].val.string')
            WHEN JSON_VALUE(data, '$.map[1].key.symbol') = 'wasm_name' 
                THEN JSON_VALUE(data, '$.map[1].val.string')
            WHEN JSON_VALUE(data, '$.map[2].key.symbol') = 'wasm_name' 
                THEN JSON_VALUE(data, '$.map[2].val.string')
            WHEN JSON_VALUE(data, '$.map[3].key.symbol') = 'wasm_name' 
                THEN JSON_VALUE(data, '$.map[3].val.string')
        END AS wasm_name,

        -- Version (Looking for 'version' key, extracting 'string' value)
        CASE
            WHEN JSON_VALUE(data, '$.map[0].key.symbol') = 'version' 
                THEN JSON_VALUE(data, '$.map[0].val.string')
            WHEN JSON_VALUE(data, '$.map[1].key.symbol') = 'version' 
                THEN JSON_VALUE(data, '$.map[1].val.string')
            WHEN JSON_VALUE(data, '$.map[2].key.symbol') = 'version' 
                THEN JSON_VALUE(data, '$.map[2].val.string')
            WHEN JSON_VALUE(data, '$.map[3].key.symbol') = 'version' 
                THEN JSON_VALUE(data, '$.map[3].val.string')
        END AS wasm_version,

        -- Deployer (Looking for 'deployer' key, extracting 'address' value)
        CASE
            WHEN JSON_VALUE(data, '$.map[0].key.symbol') = 'deployer' 
                THEN JSON_VALUE(data, '$.map[0].val.address')
            WHEN JSON_VALUE(data, '$.map[1].key.symbol') = 'deployer' 
                THEN JSON_VALUE(data, '$.map[1].val.address')
            WHEN JSON_VALUE(data, '$.map[2].key.symbol') = 'deployer' 
                THEN JSON_VALUE(data, '$.map[2].val.address')
            WHEN JSON_VALUE(data, '$.map[3].key.symbol') = 'deployer' 
                THEN JSON_VALUE(data, '$.map[3].val.address')
        END AS deployer,

        -- Contract ID (Looking for 'contract_id' key, extracting 'address' value)
        CASE
            WHEN JSON_VALUE(data, '$.map[0].key.symbol') = 'contract_id' 
                THEN JSON_VALUE(data, '$.map[0].val.address')
            WHEN JSON_VALUE(data, '$.map[1].key.symbol') = 'contract_id' 
                THEN JSON_VALUE(data, '$.map[1].val.address')
            WHEN JSON_VALUE(data, '$.map[2].key.symbol') = 'contract_id' 
                THEN JSON_VALUE(data, '$.map[2].val.address')
            WHEN JSON_VALUE(data, '$.map[3].key.symbol') = 'contract_id' 
                THEN JSON_VALUE(data, '$.map[3].val.address')
        END AS contract_id

      FROM transform_2_events_with_command_name
      WHERE command = 'deploy'
    type: sql
  transform_3_publish_events:
    primary_key: id
    sql: |-
      select 
        id,
        transaction_hash, 
        ledger_sequence, 
        created_at, 
        channel,

      -- Author (Looking for 'author' key, extracting 'address' value)
        CASE
          WHEN JSON_VALUE(data, '$.map[0].key.symbol') = 'author' 
            THEN JSON_VALUE(data, '$.map[0].val.address')
          WHEN JSON_VALUE(data, '$.map[1].key.symbol') = 'author' 
            THEN JSON_VALUE(data, '$.map[1].val.address')
          WHEN JSON_VALUE(data, '$.map[2].key.symbol') = 'author' 
            THEN JSON_VALUE(data, '$.map[2].val.address')
          WHEN JSON_VALUE(data, '$.map[3].key.symbol') = 'author' 
            THEN JSON_VALUE(data, '$.map[3].val.address')
        END AS author,

        -- Version (Looking for 'version' key, extracting 'string' value)
        CASE
          WHEN JSON_VALUE(data, '$.map[0].key.symbol') = 'version' 
            THEN JSON_VALUE(data, '$.map[0].val.string')
          WHEN JSON_VALUE(data, '$.map[1].key.symbol') = 'version' 
            THEN JSON_VALUE(data, '$.map[1].val.string')
          WHEN JSON_VALUE(data, '$.map[2].key.symbol') = 'version' 
            THEN JSON_VALUE(data, '$.map[2].val.string')
          WHEN JSON_VALUE(data, '$.map[3].key.symbol') = 'version' 
            THEN JSON_VALUE(data, '$.map[3].val.string')
        END AS wasm_version,

        -- WASM Hash (Looking for 'wasm_hash' key, extracting 'bytes' value)
        CASE
          WHEN JSON_VALUE(data, '$.map[0].key.symbol') = 'wasm_hash' 
            THEN JSON_VALUE(data, '$.map[0].val.bytes')
          WHEN JSON_VALUE(data, '$.map[1].key.symbol') = 'wasm_hash' 
            THEN JSON_VALUE(data, '$.map[1].val.bytes')
          WHEN JSON_VALUE(data, '$.map[2].key.symbol') = 'wasm_hash' 
            THEN JSON_VALUE(data, '$.map[2].val.bytes')
          WHEN JSON_VALUE(data, '$.map[3].key.symbol') = 'wasm_hash' 
            THEN JSON_VALUE(data, '$.map[3].val.bytes')
        END AS wasm_hash,

        -- WASM Name (Looking for 'wasm_name' key, extracting 'string' value)
        CASE
          WHEN JSON_VALUE(data, '$.map[0].key.symbol') = 'wasm_name' 
            THEN JSON_VALUE(data, '$.map[0].val.string')
          WHEN JSON_VALUE(data, '$.map[1].key.symbol') = 'wasm_name' 
            THEN JSON_VALUE(data, '$.map[1].val.string')
          WHEN JSON_VALUE(data, '$.map[2].key.symbol') = 'wasm_name' 
            THEN JSON_VALUE(data, '$.map[2].val.string')
          WHEN JSON_VALUE(data, '$.map[3].key.symbol') = 'wasm_name' 
            THEN JSON_VALUE(data, '$.map[3].val.string')
        END AS wasm_name
      from transform_2_events_with_command_name
      where command = 'publish'
    type: sql
  transform_3_register_events:
    primary_key: id
    sql: |-
      SELECT 
          id, transaction_hash, ledger_sequence, created_at, channel,
          -- contract_name (string)
          CASE
              WHEN JSON_VALUE(data, '$.map[0].key.symbol') = 'contract_name' THEN JSON_VALUE(data, '$.map[0].val.string')
              WHEN JSON_VALUE(data, '$.map[1].key.symbol') = 'contract_name' THEN JSON_VALUE(data, '$.map[1].val.string')
              WHEN JSON_VALUE(data, '$.map[2].key.symbol') = 'contract_name' THEN JSON_VALUE(data, '$.map[2].val.string')
              WHEN JSON_VALUE(data, '$.map[3].key.symbol') = 'contract_name' THEN JSON_VALUE(data, '$.map[3].val.string')
          END AS contract_name,
          -- contract_id (address)
          CASE
              WHEN JSON_VALUE(data, '$.map[0].key.symbol') = 'contract_id' THEN JSON_VALUE(data, '$.map[0].val.address')
              WHEN JSON_VALUE(data, '$.map[1].key.symbol') = 'contract_id' THEN JSON_VALUE(data, '$.map[1].val.address')
              WHEN JSON_VALUE(data, '$.map[2].key.symbol') = 'contract_id' THEN JSON_VALUE(data, '$.map[2].val.address')
              WHEN JSON_VALUE(data, '$.map[3].key.symbol') = 'contract_id' THEN JSON_VALUE(data, '$.map[3].val.address')
          END AS contract_id,
          -- sac (bool)
          CASE
              WHEN JSON_VALUE(data, '$.map[0].key.symbol') = 'sac' THEN CAST(JSON_VALUE(data, '$.map[0].val.bool') AS BOOLEAN)
              WHEN JSON_VALUE(data, '$.map[1].key.symbol') = 'sac' THEN CAST(JSON_VALUE(data, '$.map[1].val.bool') AS BOOLEAN)
              WHEN JSON_VALUE(data, '$.map[2].key.symbol') = 'sac' THEN CAST(JSON_VALUE(data, '$.map[2].val.bool') AS BOOLEAN)
              WHEN JSON_VALUE(data, '$.map[3].key.symbol') = 'sac' THEN CAST(JSON_VALUE(data, '$.map[3].val.bool') AS BOOLEAN)
          END AS sac,
          -- wasm_hash (bytes/hex)
          CASE
              WHEN JSON_VALUE(data, '$.map[0].key.symbol') = 'wasm_hash' THEN JSON_VALUE(data, '$.map[0].val.bytes')
              WHEN JSON_VALUE(data, '$.map[1].key.symbol') = 'wasm_hash' THEN JSON_VALUE(data, '$.map[1].val.bytes')
              WHEN JSON_VALUE(data, '$.map[2].key.symbol') = 'wasm_hash' THEN JSON_VALUE(data, '$.map[2].val.bytes')
              WHEN JSON_VALUE(data, '$.map[3].key.symbol') = 'wasm_hash' THEN JSON_VALUE(data, '$.map[3].val.bytes')
          END AS wasm_hash
      FROM transform_2_events_with_command_name
      WHERE command = 'register'
    type: sql
  transform_3_rename:
    primary_key: id
    sql: |-
      SELECT 
          id, transaction_hash, ledger_sequence, created_at, channel,
          CASE
              WHEN JSON_VALUE(data, '$.map[0].key.symbol') = 'old_name' THEN JSON_VALUE(data, '$.map[0].val.string')
              WHEN JSON_VALUE(data, '$.map[1].key.symbol') = 'old_name' THEN JSON_VALUE(data, '$.map[1].val.string')
          END AS old_name,
          CASE
              WHEN JSON_VALUE(data, '$.map[0].key.symbol') = 'new_name' THEN JSON_VALUE(data, '$.map[0].val.string')
              WHEN JSON_VALUE(data, '$.map[1].key.symbol') = 'new_name' THEN JSON_VALUE(data, '$.map[1].val.string')
          END AS new_name
      FROM transform_2_events_with_command_name
      WHERE command = 'rename'
    type: sql
  transform_3_update_address:
    primary_key: id
    sql: |-
      SELECT 
          id, transaction_hash, ledger_sequence, created_at, channel,
          CASE
              WHEN JSON_VALUE(data, '$.map[0].key.symbol') = 'contract_name' THEN JSON_VALUE(data, '$.map[0].val.string')
              WHEN JSON_VALUE(data, '$.map[1].key.symbol') = 'contract_name' THEN JSON_VALUE(data, '$.map[1].val.string')
          END AS contract_name,
          CASE
              WHEN JSON_VALUE(data, '$.map[0].key.symbol') = 'new_address' THEN JSON_VALUE(data, '$.map[0].val.address')
              WHEN JSON_VALUE(data, '$.map[1].key.symbol') = 'new_address' THEN JSON_VALUE(data, '$.map[1].val.address')
          END AS new_address
      FROM transform_2_events_with_command_name
      WHERE command = 'update_address'
    type: sql
  transform_3_update_owner:
    primary_key: id
    sql: |-
      SELECT
          id, transaction_hash, ledger_sequence, created_at, channel,
          CASE
              WHEN JSON_VALUE(data, '$.map[0].key.symbol') = 'contract_name' THEN JSON_VALUE(data, '$.map[0].val.string')
              WHEN JSON_VALUE(data, '$.map[1].key.symbol') = 'contract_name' THEN JSON_VALUE(data, '$.map[1].val.string')
          END AS contract_name,
          CASE
              WHEN JSON_VALUE(data, '$.map[0].key.symbol') = 'new_owner' THEN JSON_VALUE(data, '$.map[0].val.address')
              WHEN JSON_VALUE(data, '$.map[1].key.symbol') = 'new_owner' THEN JSON_VALUE(data, '$.map[1].val.address')
          END AS new_owner
      FROM transform_2_events_with_command_name
      WHERE command = 'update_owner'
    type: sql
  transform_3_subregistry_events:
    primary_key: contract_id
    sql: |-
      SELECT
          id,
          transaction_hash,
          ledger_sequence,
          created_at,
          CASE
              WHEN JSON_VALUE(data, '$.map[0].key.symbol') = 'contract_id'
                  THEN JSON_VALUE(data, '$.map[0].val.address')
              WHEN JSON_VALUE(data, '$.map[1].key.symbol') = 'contract_id'
                  THEN JSON_VALUE(data, '$.map[1].val.address')
          END AS contract_id,
          CASE
              WHEN JSON_VALUE(data, '$.map[0].key.symbol') = 'name'
                  THEN JSON_VALUE(data, '$.map[0].val.string')
              WHEN JSON_VALUE(data, '$.map[1].key.symbol') = 'name'
                  THEN JSON_VALUE(data, '$.map[1].val.string')
          END AS channel
      FROM transform_2_events_with_command_name
      WHERE command = 'sub_reg'
        AND emitter_contract_id = 'CBT6FE6WLI3IBZPKQ4JJRHD5LIVUKNSGOT4B7CWMYTJMTCQOGUJH5JTI'
    type: sql
sinks:
  deploy_events_pg:
    from: transform_3_deploy_events
    schema: public
    secret_name: HOSTED_POSTGRES_CMJD1KI8O0
    table: v4_deployed_contracts
    type: postgres
  publish_events_pg:
    from: transform_3_publish_events
    schema: public
    secret_name: HOSTED_POSTGRES_CMJD1KI8O0
    table: v4_published_wasms
    type: postgres
  raw_events_backup:
    from: transform_1_events
    schema: public
    secret_name: HOSTED_POSTGRES_CMJD1KI8O0
    table: v4_raw_events_backup
    type: postgres
  register_events_pg:
    from: transform_3_register_events
    schema: public
    secret_name: HOSTED_POSTGRES_CMJD1KI8O0
    table: v4_registered_contracts
    type: postgres
  rename_events_pg:
    from: transform_3_rename
    schema: public
    secret_name: HOSTED_POSTGRES_CMJD1KI8O0
    table: v4_rename
    type: postgres
  update_address_events_pg:
    from: transform_3_update_address
    schema: public
    secret_name: HOSTED_POSTGRES_CMJD1KI8O0
    table: v4_update_address
    type: postgres
  update_owner_events_pg:
    from: transform_3_update_owner
    schema: public
    secret_name: HOSTED_POSTGRES_CMJD1KI8O0
    table: v4_update_owner
    type: postgres
  subregistry_events_pg:
    from: transform_3_subregistry_events
    schema: public
    secret_name: HOSTED_POSTGRES_CMJD1KI8O0
    table: registries
    type: postgres

