name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      # CI uses a GitHub service container; local dev uses docker-compose.
      # The seed scripts in fly-app/sql/ are applied manually by steps below.
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        # Health check to ensure postgres is ready before starting the job
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2

    - name: Initialize role
      run: |
        PGPASSWORD=postgres psql -h localhost -U postgres -d postgres -f 1_role.sql
      working-directory: ./fly-app/sql


    - name: Initialize database
      run: |
        PGPASSWORD=postgres psql -h localhost -U postgres -d postgres -f dump.sql
      working-directory: ./fly-app/sql

    - name: Run tests
      run: cargo test
      working-directory: ./fly-app
