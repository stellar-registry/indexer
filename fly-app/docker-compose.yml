services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"
    volumes:
      # Maps the dump file to the auto-initialization directory.
      # Note: Using backup.sql as generated by bin/create_db_dump.sh
      - ./backup.sql:/docker-entrypoint-initdb.d/init.sql
