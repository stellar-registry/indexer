name: registry-testnet-v4
resource_size: s
use_dedicated_ip: false
job: false
sources:
    goldsky_source:
        dataset_name: stellar_testnet.events
        start_at: 2206305
        type: dataset
        version: 1.2.0
transforms:
    transform_1_events_raw:
        primary_key: id
        sql: |-
            SELECT *
            FROM goldsky_source
            WHERE in_successful_contract_call = true
              AND transaction_successful = true
              AND id NOT LIKE '%-op-none-%'
              AND JSON_VALUE(topics, '$[0].symbol') IN (
                    'deploy',
                    'publish',
                    'register',
                    'rename',
                    'update_address',
                    'update_owner',
                    'sub_reg'
                  )
        type: sql
    transform_2_events_with_name_raw:
        primary_key: id
        sql: |-
            SELECT
              id,
              transaction_hash,
              ledger_sequence,
              ledger_closed_at as created_at,
              JSON_VALUE(topics, '$[0].symbol') as event_name,
              contract_id as emitter_contract_id,
              data,
              topics
            FROM transform_1_events_raw
        type: sql

    # getting only `sub_reg` events fired by the root registry
    transform_3_subregistry_events:
        type: sql
        primary_key: contract_id
        sql: |-
            SELECT
                id,
                transaction_hash,
                ledger_sequence,
                created_at,
                JSON_VALUE(data, 'lax $.map[*]?(@.key.symbol == "contract_id").val.address') AS contract_id,
                JSON_VALUE(data, 'lax $.map[*]?(@.key.symbol == "name").val.string') AS registry_channel
            FROM transform_2_events_with_name_raw
            WHERE event_name = 'sub_reg'
              AND emitter_contract_id = 'CAG5VYJR67TYA76FXPTQOGJXSO47CIUB7FNIG2KQ4VDMALGYZC65H5MW'

    registries_dynamic_table:
        type: dynamic_table
        backend_type: Postgres
        backend_entity_name: v4_registries_dynamic_table
        secret_name: HOSTED_POSTGRES_CMJD1KI8O0
        schema: public
        sql: SELECT contract_id FROM transform_3_subregistry_events

    # joins to `registries_dynamic_table` to get only events emitted by official Registry and its subregistries
    transform_4_events_with_name:
        type: sql
        primary_key: id
        sql: |-
            SELECT *
            FROM transform_2_events_with_name_raw
            WHERE dynamic_table_check('registries_dynamic_table', emitter_contract_id)

    transform_5_deploy_events:
        type: sql
        primary_key: id
        sql: |-
            SELECT
              id,
              transaction_hash,
              ledger_sequence,
              created_at,
              emitter_contract_id,
              JSON_VALUE(data, 'lax $.map[*]?(@.key.symbol == "wasm_name").val.string') AS wasm_name,
              JSON_VALUE(data, 'lax $.map[*]?(@.key.symbol == "version").val.string') AS wasm_version,
              JSON_VALUE(data, 'lax $.map[*]?(@.key.symbol == "deployer").val.address') AS deployer,
              JSON_VALUE(data, 'lax $.map[*]?(@.key.symbol == "contract_id").val.address') AS contract_id,
              JSON_VALUE(data, 'lax $.map[*]?(@.key.symbol == "registry").val.address') AS registry_contract_id
            FROM transform_4_events_with_name
            WHERE event_name = 'deploy'
    transform_5_publish_events:
        primary_key: id
        sql: |-
            SELECT
              id,
              transaction_hash,
              ledger_sequence,
              created_at,
              emitter_contract_id,
              JSON_VALUE(data, 'lax $.map[*]?(@.key.symbol == "author").val.address') AS author,
              JSON_VALUE(data, 'lax $.map[*]?(@.key.symbol == "version").val.string') AS wasm_version,
              JSON_VALUE(data, 'lax $.map[*]?(@.key.symbol == "wasm_hash").val.bytes') AS wasm_hash,
              JSON_VALUE(data, 'lax $.map[*]?(@.key.symbol == "wasm_name").val.string') AS wasm_name
            FROM transform_4_events_with_name
            WHERE event_name = 'publish'
        type: sql
    transform_5_register_events:
        primary_key: id
        sql: |-
            SELECT
                id, transaction_hash, ledger_sequence, created_at, emitter_contract_id,
                JSON_VALUE(data, 'lax $.map[*]?(@.key.symbol == "contract_name").val.string') AS contract_name,
                JSON_VALUE(data, 'lax $.map[*]?(@.key.symbol == "contract_id").val.address') AS contract_id,
                CAST(JSON_VALUE(data, 'lax $.map[*]?(@.key.symbol == "sac").val.bool') AS BOOLEAN) AS sac,
                JSON_VALUE(data, 'lax $.map[*]?(@.key.symbol == "wasm_hash").val.bytes') AS wasm_hash
            FROM transform_4_events_with_name
            WHERE event_name = 'register'
        type: sql
    transform_5_rename:
        primary_key: id
        sql: |-
            SELECT
                id, transaction_hash, ledger_sequence, created_at, emitter_contract_id,
                JSON_VALUE(data, 'lax $.map[*]?(@.key.symbol == "old_name").val.string') AS old_name,
                JSON_VALUE(data, 'lax $.map[*]?(@.key.symbol == "new_name").val.string') AS new_name
            FROM transform_4_events_with_name
            WHERE event_name = 'rename'
        type: sql
    transform_5_update_address:
        primary_key: id
        sql: |-
            SELECT
                id, transaction_hash, ledger_sequence, created_at, emitter_contract_id,
                JSON_VALUE(data, 'lax $.map[*]?(@.key.symbol == "contract_name").val.string') AS contract_name,
                JSON_VALUE(data, 'lax $.map[*]?(@.key.symbol == "new_address").val.address') AS new_address
            FROM transform_4_events_with_name
            WHERE event_name = 'update_address'
        type: sql
    transform_5_update_owner:
        primary_key: id
        sql: |-
            SELECT
                id, transaction_hash, ledger_sequence, created_at, emitter_contract_id,
                JSON_VALUE(data, 'lax $.map[*]?(@.key.symbol == "contract_name").val.string') AS contract_name,
                JSON_VALUE(data, 'lax $.map[*]?(@.key.symbol == "new_owner").val.address') AS new_owner
            FROM transform_4_events_with_name
            WHERE event_name = 'update_owner'
        type: sql
sinks:
    subregistry_events_pg:
        from: transform_3_subregistry_events
        schema: public
        secret_name: HOSTED_POSTGRES_CMJD1KI8O0
        table: v4_registries
        type: postgres
    deploy_events_pg:
        from: transform_5_deploy_events
        schema: public
        secret_name: HOSTED_POSTGRES_CMJD1KI8O0
        table: v4_deployed_contracts
        type: postgres
    publish_events_pg:
        from: transform_5_publish_events
        schema: public
        secret_name: HOSTED_POSTGRES_CMJD1KI8O0
        table: v4_published_wasms
        type: postgres
    raw_events_backup:
        from: transform_1_events_raw
        schema: public
        secret_name: HOSTED_POSTGRES_CMJD1KI8O0
        table: v4_raw_events_backup
        type: postgres
    register_events_pg:
        from: transform_5_register_events
        schema: public
        secret_name: HOSTED_POSTGRES_CMJD1KI8O0
        table: v4_registered_contracts
        type: postgres
    rename_events_pg:
        from: transform_5_rename
        schema: public
        secret_name: HOSTED_POSTGRES_CMJD1KI8O0
        table: v4_rename
        type: postgres
    update_address_events_pg:
        from: transform_5_update_address
        schema: public
        secret_name: HOSTED_POSTGRES_CMJD1KI8O0
        table: v4_update_address
        type: postgres
    update_owner_events_pg:
        from: transform_5_update_owner
        schema: public
        secret_name: HOSTED_POSTGRES_CMJD1KI8O0
        table: v4_update_owner
        type: postgres
