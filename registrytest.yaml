resource_size: s
sources:
  source_1:
    dataset_name: stellar_testnet.events
    version: 3.0.0
    type: dataset
    start_at: latest
transforms:
  events:
    type: sql
    primary_key: id
    sql: |-
      SELECT * from source_1 
        where contract_id = 'CBF5NGWSJARS6CKGEJ2WUR4RSSHQFKEXUS2V5FF6VJRBSLXZB2WMHXIV' 
        and in_successful_contract_call=true 
        and transaction_successful=true
  events_with_command_name:
    type: sql
    primary_key: id
    sql: |-
      select 
        id,
        transaction_hash, 
        ledger_sequence, 
        ledger_closed_at as created_at, 
        JSON_VALUE(topics, '$[0].symbol') as command,
        data
      from events
  deploys:
    type: sql
    primary_key: id
    sql: |-
      select 
        id,
        transaction_hash, 
        ledger_sequence, 
        created_at, 
        JSON_VALUE(data, '$.map[0].val.address') as contract_id,
        JSON_VALUE(data, '$.map[1].val.string') as contract_name,
        JSON_VALUE(data, '$.map[2].val.address') as deployer,
        JSON_VALUE(data, '$.map[3].val.string') as version,
        JSON_VALUE(data, '$.map[4].val.string') as wasm_name
      from events_with_command_name
      where command = 'deploy'
  publishes:
    type: sql
    primary_key: id
    sql: |-
      select 
        id,
        transaction_hash, 
        ledger_sequence, 
        created_at, 
        JSON_VALUE(data, '$.map[0].val.address') as author,
        JSON_VALUE(data, '$.map[1].val.string') as version,
        JSON_VALUE(data, '$.map[2].val.bytes') as wasm_hash,
        JSON_VALUE(data, '$.map[3].val.string') as wasm_name
      from events_with_command_name
      where command = 'publish'
sinks:
  sink_2:
    type: postgres
    table: events
    schema: public
    secret_name: HOSTED_POSTGRES_CMJD1KI8O0
    from: events
  sink_3:
    type: postgres
    table: deploys
    schema: public
    secret_name: HOSTED_POSTGRES_CMJD1KI8O0
    from: deploys
  sink_4:
    type: postgres
    table: publishes
    schema: public
    secret_name: HOSTED_POSTGRES_CMJD1KI8O0
    from: publishes
